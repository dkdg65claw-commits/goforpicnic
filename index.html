                                    <div className="w-8 h-8 rounded-full bg-rose-200 border-2 border-white flex items-center justify-center text-rose-700 text-xs font-bold shadow-sm">엄마</div>
                                    <div className="w-8 h-8 rounded-full bg-sky-200 border-2 border-white flex items-center justify-center text-sky-700 text-[11px] font-bold shadow-sm">주이</div>
                                    <div className="w-8 h-8 rounded-full bg-emerald-200 border-2 border-white flex items-center justify-center text-emerald-700 text-[11px] font-bold shadow-sm">로이</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderTimeline = (title, subtitle, colorTheme, data, isYeouido) => {
                const isAmber = colorTheme === 'amber';
                const bgHeader = isAmber ? 'bg-slate-900' : 'bg-sky-600';
                const bgIcon = isAmber ? 'bg-amber-50' : 'bg-sky-50';
                const lineGradient = isAmber ? 'from-amber-200 via-slate-200 to-amber-200' : 'from-sky-200 via-slate-200 to-sky-200';
                const dayBadgeBg = isAmber ? 'bg-amber-500' : 'bg-sky-500';

                return (
                    <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-12">
                        <header className={`${bgHeader} text-white pt-12 pb-8 px-6 rounded-b-[2.5rem] shadow-lg relative overflow-hidden`}>
                            <button onClick={() => setCurrentView('list')} className="absolute top-4 left-4 p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors flex items-center">
                                <IconChevronLeft className="w-6 h-6 text-white" />
                            </button>
                            <div className="relative z-10 flex flex-col items-center mt-2 text-center">
                                <h1 className="text-3xl font-extrabold mb-2 tracking-tight">{title}</h1>
                                <p className="text-white/80 font-medium text-sm">{subtitle}</p>
                            </div>
                        </header>

                        <main className="max-w-md mx-auto p-5 -mt-4 relative z-20">
                            {isYeouido && (
                                <div className="bg-white rounded-2xl shadow-md border border-amber-100 p-5 mb-8 flex flex-col gap-3">
                                    <div className="flex items-center gap-2 mb-1">
                                        <IconInfo className="w-5 h-5 text-amber-500" />
                                        <h2 className="text-lg font-bold text-slate-800">콘래드 라운지 혜택 (37F)</h2>
                                    </div>
                                    <div className="grid grid-cols-1 gap-2 text-sm">
                                        <div className="flex justify-between items-center bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                                            <span className="font-semibold text-slate-700">애프터눈 티</span>
                                            <span className="text-amber-700 font-medium">매일 14:00 - 16:00</span>
                                        </div>
                                        <div className="flex justify-between items-center bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                                            <span className="font-semibold text-slate-700">이브닝 칵테일</span>
                                            <span className="text-amber-700 font-medium">금 17:00 - 20:00</span>
                                        </div>
                                        <div className="flex justify-between items-center bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                                            <span className="font-semibold text-slate-700">조식</span>
                                            <span className="text-amber-700 font-medium">매일 06:30 - 10:30</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className={`relative before:absolute before:inset-0 before:ml-[1.4rem] before:h-full before:w-0.5 before:bg-gradient-to-b ${lineGradient}`}>
                                {data.map((item, index) => {
                                    if (item.type === 'day') {
                                        return (
                                            <div key={index} className="relative z-10 flex items-center py-6">
                                                <div className={`${dayBadgeBg} text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-md ml-0 border-2 border-white`}>
                                                    {item.text}
                                                </div>
                                            </div>
                                        );
                                    }
                                    return (
                                        <div key={index} className="relative flex items-start mb-8 group">
                                            <div className={`flex items-center justify-center w-12 h-12 rounded-full border-4 border-white ${bgIcon} shrink-0 shadow-sm relative z-10`}>
                                                {item.icon}
                                            </div>
                                            <div className="ml-4 flex-1">
                                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 transition-all">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <IconClock className="w-4 h-4 text-slate-400" />
                                                        <span className="text-slate-800 font-black text-lg tracking-tight">{item.time}</span>
                                                    </div>
                                                    <h3 className="font-bold text-slate-800 text-base mb-2">{item.title}</h3>
                                                    <p className="text-slate-600 text-sm leading-relaxed">{item.desc}</p>
                                                    
                                                    {item.highlight && (
                                                        <div className={`mt-3 ${isAmber ? 'bg-amber-50 border-amber-100 text-amber-800' : 'bg-sky-50 border-sky-100 text-sky-800'} border text-xs font-semibold px-3 py-2 rounded-lg flex items-center gap-2`}>
                                                            <IconInfo className="w-3.5 h-3.5" />
                                                            {item.highlight}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </main>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto relative overflow-hidden bg-white min-h-screen shadow-2xl border-x border-slate-100">
                    {currentView === 'list' && renderList()}
                    {currentView === 'yeouido' && renderTimeline('여의도 부부 휴식', '아이들 없이 온전히 서로에게 집중하는 시간', 'amber', yeouidoItinerary, true)}
                    {currentView === 'children' && renderTimeline('어린이날 대작전!', '주이, 로이와 함께하는 완벽한 나들이', 'sky', childrenItinerary, false)}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
