<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>여의도 콘래드 1박 2일</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --ink: #1e293b;
        --muted: #64748b;
        --primary: #d97706;
        --primary-soft: #fef3c7;
        --line: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .wrap {
        min-height: 100vh;
      }

      .hero {
        background: linear-gradient(120deg, #111827, #334155);
        color: #fff;
        padding: 36px 20px;
        border-radius: 0 0 24px 24px;
        text-align: center;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .hero p {
        margin: 0;
        color: #fcd34d;
        font-weight: 700;
      }

      main {
        max-width: 640px;
        margin: 16px auto;
        padding: 0 12px 24px;
      }

      .tabs {
        display: flex;
        gap: 6px;
        background: var(--card);
        border-radius: 14px;
        padding: 6px;
        box-shadow: 0 4px 14px rgba(2, 6, 23, 0.06);
      }

      .tab {
        flex: 1;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: var(--muted);
        padding: 12px 8px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }

      .tab.active {
        background: var(--primary-soft);
        color: #92400e;
      }

      .panel {
        margin-top: 14px;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        border: 1px solid #f1f5f9;
        box-shadow: 0 4px 14px rgba(2, 6, 23, 0.05);
      }

      .timeline {
        padding: 18px;
      }

      .timeline h2 {
        margin: 0 0 16px;
        font-size: 20px;
      }

      .timeline-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 74px 1fr;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }

      .timeline-item:last-child {
        border-bottom: 0;
      }

      .time {
        color: var(--primary);
        font-weight: 700;
        font-size: 13px;
      }

      .item-title {
        margin: 0 0 4px;
        font-size: 16px;
      }

      .item-desc {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .restaurants {
        display: grid;
        gap: 10px;
      }

      .restaurant {
        padding: 14px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .restaurant h3 {
        margin: 0;
        font-size: 18px;
      }

      .tag {
        display: inline-block;
        font-size: 11px;
        color: #fff;
        background: #0f172a;
        border-radius: 999px;
        padding: 4px 8px;
        white-space: nowrap;
      }

      .category {
        margin: 8px 0 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .tip {
        margin-top: 12px;
        padding: 14px;
        border-radius: 16px;
        background: #fffbeb;
        color: #92400e;
        border: 1px solid #fde68a;
        text-align: center;
        font-size: 14px;
        line-height: 1.6;
      }

      @media (max-width: 480px) {
        .tab {
          font-size: 12px;
          padding: 10px 6px;
        }

        .timeline-item {
          grid-template-columns: 66px 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="hero">
        <h1>여의도 콘래드 1박 2일</h1>
        <p>오직 두 사람만을 위한 완벽한 휴식</p>
      </header>

      <main>
        <div class="tabs">
          <button class="tab active" data-tab="day1">1일차 (금)</button>
          <button class="tab" data-tab="day2">2일차 (토)</button>
          <button class="tab" data-tab="restaurants">맛집 리스트</button>
        </div>

        <section class="panel" id="panel"></section>
      </main>
    </div>

    <script>
      const day1Itinerary = [
        { time: "11:00", title: "여의도 도착 & 첫 만찬", desc: "진주집 (시원한 국수) 또는 이도맨숀 (고급 한우 다이닝)" },
        { time: "12:30", title: "쇼핑몰 데이트", desc: "더현대 서울 또는 IFC몰 산책 (아이들 없이 가벼운 발걸음으로)" },
        { time: "14:00", title: "체크인 & 애프터눈 티", desc: "이그제큐티브 라운지(37층) 체크인 후 달콤한 티타임" },
        { time: "15:30", title: "객실 휴식", desc: "한강 뷰를 보며 푹신한 침구에서 온전한 둘만의 정비 시간" },
        { time: "17:00", title: "이브닝 칵테일", desc: "노을 맛집 라운지에서 주류와 핫푸드 즐기기 (1세션 추천)" },
        { time: "19:00", title: "야간 산책", desc: "여의도 한강공원 밤바람 맞기 혹은 IFC몰 심야 영화 관람" }
      ];

      const day2Itinerary = [
        { time: "08:30", title: "라운지 조식", desc: "누구에게도 방해받지 않는 조용하고 평화로운 아침 식사" },
        { time: "10:00", title: "스파 및 수영", desc: "실내 수영장에서 가벼운 운동 또는 객실 욕조에서 반신욕" },
        { time: "11:30", title: "체크아웃", desc: "라운지에서 여유롭게 체크아웃 진행" },
        { time: "12:00", title: "마지막 만찬", desc: "천지명 (고급 양고기) 또는 마마된장 (깔끔한 한식 정식)" },
        { time: "13:30", title: "일상 복귀", desc: "충전된 에너지를 안고 집으로 귀가" }
      ];

      const restaurants = [
        { name: "진주집", category: "캐주얼 / 한식", desc: "여의도 명물 맛집. 11시에 가면 대기 없이 시원한 콩국수나 닭칼국수를 즐길 수 있습니다.", tag: "1일차 런치 추천" },
        { name: "이도맨숀", category: "파인다이닝 / 고기", desc: "고급스럽고 조용한 공간. 아내분과 오붓하게 한우 런치 정식을 즐기며 기분 내기 좋습니다.", tag: "1일차 런치 추천" },
        { name: "천지명", category: "보양식 / 양고기", desc: "평소 접하기 힘든 양고기 전문점. 든든하고 특별하게 호캉스를 마무리하기 좋습니다.", tag: "2일차 런치 추천" },
        { name: "마마된장", category: "한식 / IFC몰", desc: "호텔과 연결된 IFC몰 내 위치. 체크아웃 후 밖으로 나갈 필요 없이 깔끔하고 속 편하게 식사 가능합니다.", tag: "2일차 런치 추천" }
      ];

      const panel = document.getElementById("panel");
      const tabButtons = Array.from(document.querySelectorAll(".tab"));

      function renderTimeline(title, data) {
        const items = data
          .map(
            (item) =>
              '<li class="timeline-item">' +
              '<div class="time">' + item.time + "</div>" +
              '<div><h3 class="item-title">' + item.title + '</h3><p class="item-desc">' + item.desc + "</p></div>" +
              "</li>"
          )
          .join("");

        panel.innerHTML =
          '<div class="card timeline">' +
          '<h2>' +
          title +
          "</h2>" +
          '<ul class="timeline-list">' +
          items +
          "</ul>" +
          "</div>";
      }

      function renderRestaurants() {
        const cards = restaurants
          .map(
            (rest) =>
              '<article class="card restaurant">' +
              '<div class="row"><h3>' +
              rest.name +
              '</h3><span class="tag">' +
              rest.tag +
              "</span></div>" +
              '<p class="category">' +
              rest.category +
              "</p>" +
              '<p class="item-desc">' +
              rest.desc +
              "</p>" +
              "</article>"
          )
          .join("");

        panel.innerHTML =
          '<div class="restaurants">' +
          cards +
          '<div class="tip">부부가 오랜만에 온전히 서로에게 집중할 수 있는 시간입니다.<br />상황에 맞춰 유연하게 일정을 조절하며 즐거운 추억 만드시길 바랍니다.</div>' +
          "</div>";
      }

      function setActiveTab(tab) {
        tabButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === tab);
        });

        if (tab === "day1") {
          renderTimeline("금요일 일정", day1Itinerary);
          return;
        }
        if (tab === "day2") {
          renderTimeline("토요일 일정", day2Itinerary);
          return;
        }
        renderRestaurants();
      }

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => setActiveTab(button.dataset.tab));
      });

      setActiveTab("day1");
    </script>
  </body>
</html>
